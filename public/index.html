<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>РИБА 🐟</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, Arial;
  background: #f7f8fc;
  color: #222;
}

.container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

h1 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  color: #777;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  min-height: 120px;
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 12px;
  font-size: 14px;
  resize: none;
}

textarea:focus {
  outline: none;
  border-color: #ff9f43;
  box-shadow: 0 0 0 2px rgba(255,159,67,0.2);
}

.counter {
  font-weight: bold;
  font-size: 12px;
  text-align: right;
  color: #777;
  margin-bottom: 6px;
}

.time-badge {
  font-size: 12px;
  color: #aaa;
  text-align: right;
  margin-top: 6px;
}

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

button {
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 8px 14px;
  cursor: pointer;
  background: white;
  font-size: 14px;
}

.primary {
  background: #ff9f43;
  color: white;
  border: none;
}

.stop {
  background: #ff4d4d;
  color: white;
  border: none;
}

.active {
  background: #ff9f43 !important;
  color: white !important;
  border: none;
}

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">

<h1>РИБА 🐟</h1>
<div class="subtitle">AI генератор текстів</div>

<div class="card">
  <textarea id="input" placeholder="Встав текст..."></textarea>
</div>

<div class="card">
  <div class="row modes">
    <button onclick="setMode('telegram')" id="telegram">Telegram</button>
    <button onclick="setMode('neutral')" id="neutral">Нейтрально</button>
    <button onclick="setMode('journal')" id="journal">Журналіст</button>
    <button onclick="setMode('auto')" id="auto">⚡ Auto</button>
  </div>
</div>

<div class="card">
  <button class="primary" onclick="send()">ЗРОБИТИ РИБУ</button>
</div>

<div class="card">
  <textarea id="output" placeholder="Тут буде результат..."></textarea>
  <div class="time-badge" id="time"></div>
</div>

</div>

<script>
let mode = "auto";

function setMode(m) {
  mode = m;
  document.querySelectorAll(".modes button").forEach(b => b.classList.remove("active"));
  document.getElementById(m).classList.add("active");
}

async function send() {
  const text = document.getElementById("input").value;
  const output = document.getElementById("output");
  const time = document.getElementById("time");

  if (!text.trim()) {
    output.value = "⚠️ Встав текст";
    return;
  }

  const start = Date.now();
  output.value = "⏳ Генеруємо...";

  try {
    const res = await fetch("/api/test", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text, mode })
    });

    const data = await res.json();
    output.value = data.result;

    const t = ((Date.now() - start) / 1000).toFixed(1);
    time.innerText = "⏱ " + t + "с";

  } catch {
    output.value = "❌ Помилка";
  }
}

setMode("auto");
</script>

</body>
</html>
