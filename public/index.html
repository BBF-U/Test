<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>РИБА 🐟</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, Arial;
  background: #f7f8fc;
  color: #222;
}

.container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

h1 {
  text-align: center;
  font-size: 28px;
}

.subtitle {
  text-align: center;
  color: #777;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  min-height: 120px;
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 12px;
  font-size: 14px;
  resize: none;
}

textarea:focus {
  outline: none;
  border-color: #ff9f43;
}

.counter {
  font-size: 12px;
  text-align: right;
  margin-bottom: 6px;
}

.counter.green { color: #26de81; }
.counter.yellow { color: #f7b731; }
.counter.red { color: #ff4d4d; }

.time-badge {
  font-size: 12px;
  color: #aaa;
  text-align: right;
  margin-top: 6px;
}

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

button {
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 8px 14px;
  cursor: pointer;
  background: white;
}

.primary { background: #ff9f43; color: white; border: none; }
.stop { background: #ff4d4d; color: white; border: none; }

.active {
  background: #ff9f43 !important;
  color: white !important;
  border: none;
}

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">

<h1>РИБА 🐟</h1>
<div class="subtitle">AI генератор текстів</div>

<!-- INPUT -->
<div class="card">
  <div class="counter" id="counterInput">0 символів</div>
  <textarea id="input" placeholder="Встав текст..."></textarea>
  <div class="actions">
    <button onclick="clearInput()">Очистити</button>
  </div>
</div>

<!-- MODES -->
<div class="card">
  <div class="row modes">
    <button onclick="setMode('telegram')" id="telegram">Telegram</button>
    <button onclick="setMode('neutral')" id="neutral">Нейтрально</button>
    <button onclick="setMode('journal')" id="journal">Журналіст</button>
    <button onclick="setMode('auto')" id="auto">⚡ Auto</button>
  </div>

  <div class="row sizes" style="margin-top:10px">
    <button onclick="setSize('short')" id="short">Стисло</button>
    <button onclick="setSize('medium')" id="medium">Середнє</button>
    <button onclick="setSize('long')" id="long">Детально</button>
  </div>
</div>

<!-- ACTION -->
<div class="card">
  <div class="row">
    <button id="btn" class="primary" onclick="send()">ЗРОБИТИ РИБУ</button>
  </div>
</div>

<!-- OUTPUT -->
<div class="card">
  <div class="counter" id="counterOutput">0 символів</div>
  <textarea id="output" placeholder="Тут буде результат..."></textarea>
  <div class="time-badge" id="timeBadge"></div>
</div>

</div>

<script>
let mode = "neutral";
let size = "medium";

const input = document.getElementById("input");
const output = document.getElementById("output");
const counterInput = document.getElementById("counterInput");
const counterOutput = document.getElementById("counterOutput");
const timeBadge = document.getElementById("timeBadge");

/* ================================
   📐 AUTO RESIZE
================================= */
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

/* ================================
   📊 ЧАС ЧИТАННЯ
================================= */
function readingTime(text) {
  const words = text.trim().split(/\s+/).length;
  const minutes = words / 200;
  return minutes < 1
    ? "≈ менше 1 хв"
    : "≈ " + Math.ceil(minutes) + " хв";
}

/* ================================
   🔢 INPUT COUNTER
================================= */
input.addEventListener("input", () => {
  counterInput.innerText = input.value.length + " символів";
  autoResize(input);
});

/* ================================
   🔢 OUTPUT COUNTER
================================= */
function updateOutputCounter() {
  const len = output.value.length;
  counterOutput.innerText = len + " символів";

  counterOutput.className = "counter";

  if (len > 0 && len <= 1000) counterOutput.classList.add("green");
  else if (len <= 1500) counterOutput.classList.add("yellow");
  else counterOutput.classList.add("red");

  // 🔥 додаємо час читання
  timeBadge.innerText = readingTime(output.value);
}

output.addEventListener("input", () => {
  autoResize(output);
  updateOutputCounter();
});

/* ================================
   🎛 MODE / SIZE
================================= */
function setMode(m) {
  mode = m;
  document.querySelectorAll(".modes button").forEach(b => b.classList.remove("active"));
  document.getElementById(m).classList.add("active");
}

function setSize(s) {
  size = s;
  document.querySelectorAll(".sizes button").forEach(b => b.classList.remove("active"));
  document.getElementById(s).classList.add("active");
}

/* ================================
   🚀 SEND
================================= */
async function send() {
  if (!input.value.trim()) {
    output.value = "⚠️ Встав текст";
    return;
  }

  output.value = "⏳ Генеруємо...";
  autoResize(output);

  try {
    const res = await fetch("/api/test", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: input.value,
        mode,
        size
      })
    });

    const data = await res.json();
    output.value = data.result;

    autoResize(output);
    updateOutputCounter();

  } catch {
    output.value = "❌ Помилка";
  }
}

/* ================================
   🗑 CLEAR
================================= */
function clearInput() {
  input.value = "";
  counterInput.innerText = "0 символів";
}

setMode("neutral");
setSize("medium");
</script>

</body>
</html>
