<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>РИБА 🐟</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, Arial;
  background: #f7f8fc;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  min-height: 120px;
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 12px;
  resize: none;
  overflow: hidden;
}

  /* 🔥 ФІКСИМО ТІЛЬКИ ВЕРХНЄ ПОЛЕ */
#input {
  height: 140px;
  max-height: 140px;
  overflow-y: auto;
}

.counter {
  font-size: 12px;
  text-align: right;
  margin-bottom: 6px;
  color: #888;
}

.row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

button {
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 8px 14px;
  cursor: pointer;
  background: white;
}

.primary { background: #ff9f43; color: white; border: none; }
.stop { background: #ff4d4d; color: white; border: none; }

.active {
  background: #ff9f43 !important;
  color: white !important;
  border: none;
}

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">

<!-- INPUT -->
<div class="card">
  <div class="counter" id="counterInput">0 символів</div>
  <textarea id="input" placeholder="Встав текст..."></textarea>

  <div class="actions">
    <button onclick="clearInput()">Очистити</button>
  </div>
</div>

<!-- MODES -->
<div class="card">
  <div class="row modes">
    <button onclick="setMode('telegram')" id="telegram">Telegram</button>
    <button onclick="setMode('neutral')" id="neutral">Нейтрально</button>
    <button onclick="setMode('journal')" id="journal">Журналіст</button>
  </div>

  <div class="row sizes" style="margin-top:10px">
    <button onclick="setSize('short')" id="short">Стисло</button>
    <button onclick="setSize('medium')" id="medium">Середнє</button>
    <button onclick="setSize('long')" id="long">Детально</button>
  </div>
</div>

<!-- ACTION -->
<div class="card">
  <div class="row">
    <button id="btn" class="primary" onclick="send()">ЗРОБИТИ РИБУ</button>
    <button id="stopBtn" class="stop" onclick="stopGen()" disabled>СТОП</button>
  </div>
</div>

<!-- OUTPUT -->
<div class="card">
  <div class="counter" id="counterOutput">0 символів</div>
  <textarea id="output" placeholder="Тут буде результат..."></textarea>

  <div class="actions">
    <div style="display:flex; gap:8px;">
      <button onclick="clearOutput()">Очистити</button>
      <button id="retryBtn" onclick="retry()" disabled>🔄 Ще раз</button>
    </div>
    <button onclick="copyOutput()">📋 Скопіювати</button>
  </div>
</div>

</div>

<script>
let mode = "neutral";
let size = "medium";
let lastText = null;
let lastMode = null;
let lastSize = null;

const input = document.getElementById("input");
const output = document.getElementById("output");
const counterInput = document.getElementById("counterInput");
const counterOutput = document.getElementById("counterOutput");

/* ================================
   AUTO RESIZE
================================= */
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

/* ================================
   CLEAN OUTPUT
================================= */
function cleanOutput(text) {
  return text
    .replace(/^\s*[-*•]\s+/gm, "") // прибирає -, *, •
    .replace(/\*\*/g, "")
    .trim();
}

/* ================================
   COUNTERS
================================= */
function updateInputCounter() {
  counterInput.innerText = input.value.length + " символів";
}

function updateOutputCounter() {
  counterOutput.innerText = output.value.length + " символів";
}

/* ================================
   EVENTS
================================= */
input.addEventListener("input", () => {
  updateInputCounter();
});

output.addEventListener("input", () => {
  updateOutputCounter();
  autoResize(output);
});

/* ================================
   MODE / SIZE
================================= */
function setMode(m) {
  mode = m;
  document.querySelectorAll(".modes button").forEach(b => b.classList.remove("active"));
  document.getElementById(m).classList.add("active");
}

function setSize(s) {
  size = s;
  document.querySelectorAll(".sizes button").forEach(b => b.classList.remove("active"));
  document.getElementById(s).classList.add("active");
}

/* ================================
   SEND
================================= */
async function send(isRetry = false) {
  if (!input.value.trim()) {
    output.value = "⚠️ Встав текст";
    return;
  }

  if (!isRetry) {
    lastText = input.value;
    lastMode = mode;
    lastSize = size;
  }

  output.value = "⏳ Генеруємо...";
  updateOutputCounter();
  autoResize(output);

  try {
    const res = await fetch("/api/test", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text: isRetry ? lastText : input.value,
        mode: isRetry ? lastMode : mode,
        size: isRetry ? lastSize : size
      })
    });

    const data = await res.json();

    const cleaned = cleanOutput(data.result);
    output.value = cleaned;

    updateOutputCounter();
    autoResize(output);

    document.getElementById("retryBtn").disabled = false;

  } catch {
    output.value = "❌ Помилка";
    updateOutputCounter();
  }
}

/* ================================
   RETRY
================================= */
function retry() {
  if (lastText) send(true);
}

/* ================================
   CLEAR
================================= */
function clearInput() {
  input.value = "";
  updateInputCounter();
  autoResize(input);
}

function clearOutput() {
  output.value = "";
  updateOutputCounter();
  autoResize(output);
}

/* ================================
   COPY
================================= */
function copyOutput() {
  if (!output.value) return;
  navigator.clipboard.writeText(output.value);
}

/* ================================
   INIT
================================= */
setMode("neutral");
setSize("medium");
updateInputCounter();
updateOutputCounter();
autoResize(input);
autoResize(output);
</script>

</body>
</html>
