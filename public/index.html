<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>РИБА 🐟</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, Arial;
  background: #f7f8fc;
  color: #222;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 12px;
}

h1 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  color: #777;
  margin-bottom: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  min-height: 120px;
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 12px;
  resize: none;
}

#input {
  height: 140px;
  max-height: 140px;
  overflow-y: auto;
}

#output {
  overflow: hidden;
}

.counter {
  font-size: 12px;
  text-align: right;
  margin-bottom: 6px;
  color: #888;
}

.row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

button {
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 8px 14px;
  cursor: pointer;
  background: white;
}

.primary { background: #ff9f43; color: white; border: none; }
.stop { background: #ff4d4d; color: white; border: none; }

.active {
  background: #ff9f43 !important;
  color: white !important;
  border: none;
}

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

/* 🔥 COPY BUTTON */
#copyBtn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 8px 14px;
  cursor: pointer;
  background: white;
  transition: all 0.2s ease;
}

#copyBtn.copied {
  background: #e6f7ec;
  border-color: #34c759;
  color: #1e7e34;
}
</style>
</head>

<body>
<div class="container">

<h1>РИБА 🐟</h1>
<div class="subtitle">AI генератор резюме</div>

<div class="card">
  <div class="counter" id="counterInput">0 символів</div>
  <textarea id="input" placeholder="Встав текст..."></textarea>
  <div class="actions">
    <button onclick="clearInput()">Очистити</button>
  </div>
</div>

<div class="card">
  <div class="row modes">
    <button onclick="setMode('telegram')" id="telegram">Telegram</button>
    <button onclick="setMode('neutral')" id="neutral">Нейтрально</button>
    <button onclick="setMode('journal')" id="journal">Журналіст</button>
  </div>

  <div class="row sizes" style="margin-top:10px">
    <button onclick="setSize('short')" id="short">Стисло</button>
    <button onclick="setSize('medium')" id="medium">Середнє</button>
    <button onclick="setSize('long')" id="long">Детально</button>
  </div>
</div>

<div class="card">
  <div class="row">
    <button id="btn" class="primary" onclick="send()">ЗРОБИТИ РИБУ</button>
    <button id="stopBtn" class="stop" onclick="stopGen()" disabled>СТОП</button>
  </div>
</div>

<div class="card">
  <div class="counter" id="counterOutput">0 символів</div>
  <textarea id="output" placeholder="Тут буде результат..."></textarea>

  <div class="actions">
    <div style="display:flex; gap:8px;">
      <button onclick="clearOutput()">Очистити</button>
      <button id="retryBtn" onclick="retry()" disabled>🔄 Ще раз</button>
    </div>

    <button id="copyBtn" onclick="copyOutput()">
      <span class="icon">📋</span>
      <span class="text">Скопіювати</span>
    </button>
  </div>
</div>

</div>

<script>
let mode = "neutral";
let size = "medium";
let lastText = null;
let lastMode = null;
let lastSize = null;

const input = document.getElementById("input");
const output = document.getElementById("output");
const counterInput = document.getElementById("counterInput");
const counterOutput = document.getElementById("counterOutput");

function autoResizeOutput() {
  output.style.height = "auto";
  output.style.height = output.scrollHeight + "px";
}

function cleanOutput(text) {
  return text.replace(/^\s*[-*•]\s+/gm, "").replace(/\*\*/g, "").trim();
}

function updateInputCounter() {
  counterInput.innerText = input.value.length + " символів";
}

function updateOutputCounter() {
  counterOutput.innerText = output.value.length + " символів";
}

input.addEventListener("input", updateInputCounter);

output.addEventListener("input", () => {
  updateOutputCounter();
  autoResizeOutput();
});

function setMode(m) {
  mode = m;
  document.querySelectorAll(".modes button").forEach(b => b.classList.remove("active"));
  document.getElementById(m).classList.add("active");
}

function setSize(s) {
  size = s;
  document.querySelectorAll(".sizes button").forEach(b => b.classList.remove("active"));
  document.getElementById(s).classList.add("active");
}

async function send(isRetry = false) {
  if (!input.value.trim()) {
    output.value = "⚠️ Встав текст";
    updateOutputCounter();
    return;
  }

  if (!isRetry) {
    lastText = input.value;
    lastMode = mode;
    lastSize = size;
  }

  output.value = "⏳ Генеруємо...";
  updateOutputCounter();
  autoResizeOutput();

  try {
    const res = await fetch("/api/test", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text: isRetry ? lastText : input.value,
        mode: isRetry ? lastMode : mode,
        size: isRetry ? lastSize : size
      })
    });

    const data = await res.json();

    output.value = cleanOutput(data.result);

    updateOutputCounter();
    autoResizeOutput();

    document.getElementById("retryBtn").disabled = false;

  } catch {
    output.value = "❌ Помилка";
    updateOutputCounter();
  }
}

function retry() {
  if (lastText) send(true);
}

function clearInput() {
  input.value = "";
  updateInputCounter();
}

function clearOutput() {
  output.value = "";
  updateOutputCounter();
  autoResizeOutput();
}

function copyOutput() {
  if (!output.value) return;

  const btn = document.getElementById("copyBtn");

  navigator.clipboard.writeText(output.value);

  btn.classList.add("copied");
  btn.querySelector(".text").textContent = "Скопійовано";
  btn.querySelector(".icon").textContent = "✔";

  setTimeout(() => {
    btn.classList.remove("copied");
    btn.querySelector(".text").textContent = "Скопіювати";
    btn.querySelector(".icon").textContent = "📋";
  }, 2000);
}

setMode("neutral");
setSize("medium");
updateInputCounter();
updateOutputCounter();
autoResizeOutput();

setInterval(() => {
  fetch("/ping").catch(() => {});
}, 4 * 60 * 1000);
</script>

</body>
</html>
